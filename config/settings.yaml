app:
  language: pt

paths:
  input_dir: data/input
  output_dir: data/output
  tmp_dir: data/tmp
  models_dir: models
  db_path: data/jobs.sqlite
  frontend_dir: frontend

asr:
  model: large-v3
  device: cpu
  compute_type: int8
  language: pt

separation:
  enabled: true
  model: htdemucs_ft

stems:
  model: htdemucs_6s
  quality: best
  output_format: flac
  mp3_bitrate: 320
  removal_strength: 0.92

alignment:
  enabled: true
  # empty => whisperx picks its default wav2vec2 for the configured language
  model: ""

chords:
  backend: chordino
  vocabulary: [maj, min, "5", "7", m7, maj7, m7b5, dim, sus4]
  simplify_to_triads: true
  refine_to_key: true
  filter_out_of_key_flickers: true
  chroma_reclassify: true
  chroma_reclassify_margin: 0.05
  chroma_reclassify_only_out_of_key: true

structure:
  enabled: true
  n_segments: 6
  confidence_threshold: 0.6

docx:
  style: table
  body_font: Calibri
  chord_font: Calibri
  body_size_pt: 11
  chord_size_pt: 11

worker:
  stage_timeout_seconds: 900
  poll_interval_seconds: 1.0
